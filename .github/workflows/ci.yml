name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: Build and test
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build compiled binary
        run: bun run build:compile

      - name: Run tests
        run: |
          set +e
          FAIL=0
          for dir in src/*/; do
            [ -d "$dir" ] || continue
            if ! find "$dir" \( -name "*.test.ts" -o -name "*.test.tsx" \) -print -quit | grep -q .; then
              continue
            fi
            echo "::group::Testing $dir"
            timeout --kill-after=10 --signal=TERM 120 bun test --timeout 30000 "$dir"
            EXIT=$?
            if [ $EXIT -eq 124 ]; then
              echo "::error::TIMEOUT $dir (killed after 120s)"
              FAIL=1
            elif [ $EXIT -ne 0 ]; then
              echo "::error::FAIL $dir (exit $EXIT)"
              FAIL=1
            fi
            echo "::endgroup::"
          done
          exit $FAIL
